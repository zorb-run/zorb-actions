name: Release

# changesets-driven release for a monorepo of `@zorb/*` packages.
#
# On every push to main:
#   1. If unprocessed changesets are present, changesets/action opens or
#      updates a "ci: version packages" PR that bumps the affected
#      workspaces and writes CHANGELOG.md entries.
#   2. When that PR merges, this workflow runs again — this time with no
#      remaining changesets — and `changeset publish` ships each bumped
#      workspace to NPM. With `createGithubReleases: true` the action also
#      cuts one GitHub Release per package, tagged `@zorb/<name>@<version>`,
#      with the new CHANGELOG section as the body.
#   3. The post-publish step packs each newly published workspace via
#      `npm pack` (the same set of files that npm published), extracts the
#      tarball to a flat layout, re-zips it as `zorb--<name>--<version>.zip`,
#      and attaches the zip to its release.
#
# NPM trusted publishing (OIDC) is enabled per package via
# `publishConfig.provenance: true`, so no NPM_TOKEN is needed — the
# id-token: write permission below is what unlocks publish rights.

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  cd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # changesets reads git history to find unprocessed changesets;
          # the default shallow checkout isn't enough.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

      - uses: changesets/action@e0145edc7d9d8679003495b11f87bd8ef63c0cba # v1.5.3
        id: changesets
        with:
          title: 'ci: version packages'
          commit: 'ci: version packages'
          publish: npx changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # For each package that just shipped: produce a zip of the exact
      # contents npm published (npm pack → extract → re-zip flat) and
      # attach it to that package's GitHub Release. Naming is
      # `zorb--<name>--<version>.zip`.
      - if: steps.changesets.outputs.published == 'true'
        name: Attach NPM contents to each release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          echo "$PUBLISHED" | jq -c '.[]' | while read -r pkg; do
            name=$(echo "$pkg" | jq -r .name)         # @zorb/aws
            version=$(echo "$pkg" | jq -r .version)   # 0.1.0
            short=${name#@zorb/}                      # aws
            tag="${name}@${version}"                  # @zorb/aws@0.1.0
            zipname="zorb--${short}--${version}.zip"  # zorb--aws--0.1.0.zip

            echo "::group::Packaging ${tag}"
            pushd "actions/${short}" >/dev/null
            npm pack --pack-destination "${GITHUB_WORKSPACE}/artifacts"
            popd >/dev/null

            # npm pack names the tarball `<scope-stripped-name>-<version>.tgz`
            # — for `@zorb/aws` that's `zorb-aws-0.1.0.tgz`.
            tarball="artifacts/zorb-${short}-${version}.tgz"
            workdir=$(mktemp -d)
            tar -xzf "${tarball}" -C "${workdir}"
            (cd "${workdir}/package" && zip -r "${GITHUB_WORKSPACE}/artifacts/${zipname}" .)

            gh release upload "${tag}" "artifacts/${zipname}" --clobber --repo "${{ github.repository }}"
            echo "::endgroup::"
          done
