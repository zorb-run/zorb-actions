name: Pull Requests

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

# Cancel an in-flight run when a new commit lands on the same PR — saves
# minutes while iterating without losing the final result.
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  smoke:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      # Scaffold a throwaway package to verify the template + new-package script
      # stay healthy end-to-end. With @shared/* path aliases the scaffolded
      # workspace has no cross-package deps to link, so we don't need to
      # reinstall — tsc and Bun.build resolve the helpers directly from source.
      - run: bun scripts/new-package.ts ci-smoke --description "CI smoke scaffold"
      - run: bun run typecheck
      - run: bun run test
      - run: bun scripts/build.ts --only=@zorb/ci-smoke
      - run: rm -rf actions/ci-smoke

  success:
    needs: [ci, smoke]
    runs-on: ubuntu-latest
    # Run on success or failure so the gate posts a definitive result, but
    # skip on cancellation — otherwise cancel-in-progress would flap this
    # check red on every force-push.
    if: ${{ !cancelled() }}
    steps:
      # Point branch protection at this job. Every dependency must come back
      # `success` — `skipped` counts as failure so a conditional job added
      # later can't silently pass the gate.
      - name: Check every needed job succeeded
        run: |
          echo "$NEEDS_JSON" | jq -e 'map(select(.result != "success")) | length == 0' || exit 1
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
