name: Pull Requests

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      # Scaffold a throwaway package to verify the template + new-package script
      # stay healthy end-to-end. The CI script removes the scaffold afterwards
      # so it never touches the repo state developers see.
      - run: bun scripts/new-package.ts ci-smoke --description "CI smoke scaffold"
      # Re-link workspaces so the scaffolded package can resolve its workspace
      # deps (@zorb/action-helpers) and peer types (zorb).
      - run: bun install
      - run: bun run typecheck
      - run: bun run test
      - run: bun scripts/build.ts --only=@zorb/ci-smoke
      - run: rm -rf actions/ci-smoke
